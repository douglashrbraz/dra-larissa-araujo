<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dra. Larissa Araujo | Estética Avançada</title>

  <!-- Playfair Display (título) + Open Sans (botões/corpo) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Paleta: neutros dourado/bege */
      --gold:         #BFA06A;
      --gold-mid:     #D4B483;
      --gold-light:   #EAD9B4;
      --gold-pale:    #F3ECD8;
      --beige:        #F7F1E8;
      --beige-dark:   #EDE4D4;
      --sand:         #D9CDBF;
      --brown-mid:    #8C7355;
      --brown-dark:   #4A3B2A;
      --white:        #FDFAF5;
    }

    html, body {
      min-height: 100%;
      background: var(--beige);
      font-family: 'Open Sans', sans-serif;
      color: var(--brown-dark);
    }

    /* ─── WRAPPER ─────────────────────────────────── */
    .page {
      min-height: 100dvh;
      max-width: 460px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--beige);
    }

    /* ─── HERO FOTO ────────────────────────────────── */
    .hero {
      position: relative;
      width: 100%;
      flex-shrink: 0;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      clip-path: inset(0 40px 0 0);
      transform: translateX(20px);
    }

    /* gradiente bege cobrindo a parte inferior da foto */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 52%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(247, 241, 232, 0.20) 25%,
        rgba(247, 241, 232, 0.70) 55%,
        var(--beige) 100%
      );
      pointer-events: none;
    }

    /* nome sobreposto à foto */
    .hero-name {
      position: absolute;
      bottom: 52px;
      left: 0; right: 0;
      text-align: center;
      z-index: 2;
      padding: 0 24px;
    }

    .hero-name .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 7vw, 2.1rem);
      font-weight: 500;
      font-style: italic;
      letter-spacing: 0.01em;
      color: var(--brown-dark);
      text-shadow: 0 1px 12px rgba(247, 241, 232, 0.7);
      line-height: 1.2;
    }

    .hero-name .subtitle {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.03em;
      color: var(--brown-dark);
      text-shadow: 0 1px 10px rgba(247, 241, 232, 0.8);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ─── DIVIDER ─────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 36px;
      margin: 4px 0 18px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-mid), transparent);
    }

    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold-mid);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ─── GRUPOS DE BOTÕES ────────────────────────── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 24px 6px;
    }

    /* ─── BOTÃO BASE ─────────────────────────────── */
    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      border: 1.5px solid var(--gold-mid);
      background: var(--white);
      cursor: pointer;
      text-decoration: none;
      overflow: hidden;
      transition: color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;

      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.68rem, 2.6vw, 0.76rem);
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--brown-mid);
    }

    /* fill dourado animado no hover */
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        var(--brown-mid) 0%,
        var(--gold) 40%,
        var(--gold-mid) 70%,
        var(--gold-light) 100%
      );
      transform: translateX(-108%);
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 0;
    }

    .btn:hover::before,
    .btn:focus-visible::before {
      transform: translateX(0);
    }

    .btn:hover,
    .btn:focus-visible {
      color: var(--white);
      border-color: var(--gold);
      box-shadow: 0 6px 22px rgba(191, 160, 106, 0.30);
      outline: none;
    }

    .btn-label {
      position: relative;
      z-index: 1;
    }

    /* ─── ANIMAÇÕES ENTRADA ─────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* serviços */
    .links-services .btn:nth-child(1) { animation: fadeUp 0.5s ease 0.08s both; }
    .links-services .btn:nth-child(2) { animation: fadeUp 0.5s ease 0.18s both; }
    .links-services .btn:nth-child(3) { animation: fadeUp 0.5s ease 0.28s both; }
    .links-services .btn:nth-child(4) { animation: fadeUp 0.5s ease 0.38s both; }
    .links-services .btn:nth-child(5) { animation: fadeUp 0.5s ease 0.48s both; }

    /* links */
    .links-extra .btn:nth-child(1) { animation: fadeUp 0.5s ease 0.60s both; }

    /* ─── VARIANTES DE SERVIÇO ───────────────────── */

    /* Harmonização Facial — rosé dourado */
    .btn-harmonizacao {
      border-color: #C9A882;
      background: linear-gradient(135deg, var(--white) 0%, #FBF6EE 100%);
    }
    .btn-harmonizacao::before {
      background: linear-gradient(120deg, #8C6840 0%, #BF9060 40%, #D4AA78 70%, #EAD0A0 100%);
    }

    /* Tratamentos de Pele — verde-sálvia */
    .btn-pele {
      border-color: #A8B89A;
      background: linear-gradient(135deg, var(--white) 0%, #F4F8F2 100%);
    }
    .btn-pele::before {
      background: linear-gradient(120deg, #4A6040 0%, #708860 40%, #92A878 70%, #C0D0B0 100%);
    }

    /* Estética Corporal — terracota quente */
    .btn-corporal {
      border-color: #C4A490;
      background: linear-gradient(135deg, var(--white) 0%, #FAF3EE 100%);
    }
    .btn-corporal::before {
      background: linear-gradient(120deg, #7A5040 0%, #A87060 40%, #C49080 70%, #E0BBA8 100%);
    }

    /* Terapias Capilares — marrom mogno */
    .btn-capilar {
      border-color: #B09070;
      background: linear-gradient(135deg, var(--white) 0%, #F8F2EA 100%);
    }
    .btn-capilar::before {
      background: linear-gradient(120deg, #6B4828 0%, #9A7050 40%, #B89068 70%, #D8B890 100%);
    }

    /* Skincare & Home Care — lavanda suave */
    .btn-skincare {
      border-color: #B8A8C8;
      background: linear-gradient(135deg, var(--white) 0%, #F6F2FA 100%);
    }
    .btn-skincare::before {
      background: linear-gradient(120deg, #5A4870 0%, #8870A0 40%, #A890C0 70%, #D0C0E0 100%);
    }

    /* ─── BOTÃO WHATSAPP ─────────────────────────── */
    .btn-whatsapp {
      background: linear-gradient(135deg, #1E5C34 0%, #25A854 50%, #2DD470 100%);
      border-color: #25A854;
      color: var(--white);
      font-weight: 700;
      letter-spacing: 0.18em;
      box-shadow: 0 4px 18px rgba(37, 168, 84, 0.28);
    }
    .btn-whatsapp::before { display: none; }
    .btn-whatsapp:hover {
      opacity: 0.86;
      box-shadow: 0 7px 24px rgba(37, 168, 84, 0.42);
      color: var(--white);
      border-color: #25A854;
    }

/* ─── RÓTULO DE SEÇÃO ────────────────────────── */
    .section-label {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      padding: 22px 0 10px;
    }

    /* ─── FOOTER ─────────────────────────────────── */
    .footer {
      margin-top: auto;
      padding: 22px 28px 30px;
      text-align: center;
    }

    .footer-line {
      font-family: 'Playfair Display', serif;
      font-size: 0.78rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--gold);
      opacity: 0.65;
    }

    /* ─── REDUCED MOTION ─────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .btn, .btn::before, .btn-icon,
      .links-services .btn,
      .links-extra .btn { animation: none; transition: none; }
    }
  </style>
</head>
